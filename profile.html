<!DOCTYPE html>
<html class="dark" lang="en" style="background:#18120b"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Account - Karupatti Kadai</title>
<link rel="icon" type="image/png" href="/video/logo.png" />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@500;600;700&amp;family=Be+Vietnam+Pro:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config={darkMode:"class",theme:{extend:{"colors":{"inverse-primary":"#825500","on-primary":"#452b00","background":"#18120b","on-background":"#eee0d3","primary-container":"#c58308","surface-container-high":"#302920","surface-container-highest":"#3b342b","primary":"#ffb952","error":"#ffb4ab","surface-bright":"#40382f","outline-variant":"#514535","secondary":"#e3bfad","surface":"#18120b","on-surface-variant":"#d6c4af","surface-container":"#251f17","on-surface":"#eee0d3","outline":"#9e8e7b","on-primary-container":"#3c2500","surface-container-lowest":"#130d07","surface-tint":"#ffb952","on-error":"#690005","error-container":"#93000a","on-error-container":"#ffdad6","tertiary":"#b8cf88","tertiary-container":"#839857","on-tertiary":"#253600","surface-container-low":"#211b13"},"borderRadius":{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},"spacing":{"unit":"8px","section-gap":"80px","gutter":"24px","margin-mobile":"16px","container-max":"1280px"},"fontFamily":{"body-md":["Be Vietnam Pro"],"label-caps":["Be Vietnam Pro"],"headline-md":["Noto Serif"],"body-lg":["Be Vietnam Pro"],"display-lg":["Noto Serif"],"headline-xl":["Noto Serif"]},"fontSize":{"body-md":["15px",{"lineHeight":"22px","fontWeight":"400"}],"label-caps":["11px",{"lineHeight":"16px","letterSpacing":"0.1em","fontWeight":"700"}],"headline-md":["24px",{"lineHeight":"32px","fontWeight":"500"}],"body-lg":["16px",{"lineHeight":"24px","fontWeight":"400"}],"display-lg":["36px",{"lineHeight":"44px","letterSpacing":"-0.02em","fontWeight":"700"}],"headline-xl":["32px",{"lineHeight":"40px","fontWeight":"600"}]}}}}
</script>
<style>
.material-symbols-outlined{font-variation-settings:"FILL" 0,"wght" 400,"GRAD" 0,"opsz" 24}
.glass-card{backdrop-filter:blur(20px);background:linear-gradient(135deg,rgba(59,52,43,0.4) 0%,rgba(24,18,11,0.6) 100%)}
.palm-particle{position:fixed;top:0;left:0;width:6px;height:6px;background-color:#ffb952;border-radius:50%;pointer-events:none;z-index:9999;box-shadow:0 0 8px #ffb952;opacity:0.8;transition:transform 0.4s ease-out,opacity 0.4s ease-out}
.jaggery-gradient { background: radial-gradient(circle at center, #3c2500 0%, #18120b 100%) fixed; }
</style>
</head>
<body class="jaggery-gradient text-on-background font-body-md selection:bg-primary/30">

<!-- Nav -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/20 shadow-2xl">
<div class="flex justify-between items-center w-full px-gutter py-4 max-w-container-max mx-auto">
  <a href="/" class="flex items-center gap-2 md:gap-3 font-display-lg text-xl md:text-2xl text-primary drop-shadow-[0_2px_4px_rgba(255,185,82,0.3)] hover:opacity-90 transition-opacity">
    <img src="/video/logo.png" alt="Karupatti Kadai Logo" class="w-8 h-8 rounded-full border border-primary/20 object-cover shadow-md" />
    <span>Karupatti Kadai</span>
  </a>
  <div class="flex items-center gap-4">
    <a href="/collection" class="text-on-surface-variant hover:text-primary transition-colors font-body-md hidden md:block">Shop All</a>
    <a href="/checkout" class="p-2 hover:bg-primary/10 rounded-full transition-all relative">
      <span class="material-symbols-outlined text-primary">shopping_cart</span>
      <span data-cart-count class="absolute top-1 right-1 w-4 h-4 bg-primary text-on-primary text-[10px] flex items-center justify-center rounded-full font-bold" style="display:none">0</span>
    </a>
    <a href="/profile" class="p-2 hover:bg-primary/10 rounded-full transition-all">
      <span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1;">account_circle</span>
    </a>
  </div>
</div>
</nav>

<main class="pt-24 pb-16 px-gutter max-w-container-max mx-auto">
  <div class="flex flex-col lg:flex-row gap-8">
    
    <!-- Sidebar -->
    <aside class="lg:w-72">
      <div class="glass-card rounded-xl p-6 border border-outline-variant/20">
        <div class="flex items-center gap-4 mb-6">
          <div class="w-14 h-14 rounded-full bg-primary/20 flex items-center justify-center">
            <span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings:'FILL' 1;">account_circle</span>
          </div>
          <div>
            <h2 id="profile-name" class="font-headline-md text-xl text-on-surface">Loading...</h2>
            <p id="profile-email" class="text-on-surface-variant text-sm"></p>
          </div>
        </div>
        <div class="flex flex-col gap-1">
          <button onclick="showSection('orders')" class="profile-tab flex items-center gap-3 px-4 py-3 rounded-lg text-left hover:bg-primary/10 transition-colors text-on-surface-variant" data-tab="orders">
            <span class="material-symbols-outlined">receipt_long</span> Order History
          </button>
          <button onclick="showSection('addresses')" class="profile-tab flex items-center gap-3 px-4 py-3 rounded-lg text-left hover:bg-primary/10 transition-colors text-on-surface-variant" data-tab="addresses">
            <span class="material-symbols-outlined">location_on</span> Saved Addresses
          </button>
          <button onclick="showSection('wishlist')" class="profile-tab flex items-center gap-3 px-4 py-3 rounded-lg text-left hover:bg-primary/10 transition-colors text-on-surface-variant" data-tab="wishlist">
            <span class="material-symbols-outlined">favorite</span> Wishlist
          </button>
          <button onclick="showSection('settings')" class="profile-tab flex items-center gap-3 px-4 py-3 rounded-lg text-left hover:bg-primary/10 transition-colors text-on-surface-variant" data-tab="settings">
            <span class="material-symbols-outlined">settings</span> Profile Settings
          </button>
          <hr class="border-outline-variant/20 my-2"/>
          <button onclick="handleLogout()" class="flex items-center gap-3 px-4 py-3 rounded-lg text-left hover:bg-error-container/20 transition-colors text-error">
            <span class="material-symbols-outlined">logout</span> Logout
          </button>
        </div>
      </div>
    </aside>

    <!-- Content -->
    <section class="flex-1">
      
      <!-- Orders Section -->
      <div id="section-orders" class="profile-section">
        <h2 class="font-headline-xl text-2xl md:text-headline-xl text-primary mb-6">Order History</h2>
        <div id="orders-list" class="space-y-4">
          <div class="text-center py-12 text-on-surface-variant">
            <span class="material-symbols-outlined text-5xl mb-4 block opacity-30">receipt_long</span>
            <p>Loading orders...</p>
          </div>
        </div>
      </div>

      <!-- Addresses Section -->
      <div id="section-addresses" class="profile-section hidden">
        <div class="flex justify-between items-center mb-6">
          <h2 class="font-headline-xl text-2xl md:text-headline-xl text-primary">Saved Addresses</h2>
          <button onclick="showAddressForm()" class="px-4 py-2 bg-primary text-on-primary rounded-lg font-bold text-sm flex items-center gap-2 hover:bg-primary-container transition-colors">
            <span class="material-symbols-outlined text-lg">add</span> Add New
          </button>
        </div>
        <div id="address-form-container" class="hidden glass-card rounded-xl p-6 border border-outline-variant/20 mb-6">
          <h3 class="font-headline-md text-lg mb-4">New Address</h3>
          <form onsubmit="handleAddAddress(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input id="addr-label" class="bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface py-2 px-1 placeholder:text-outline-variant" placeholder="Label (Home, Office...)" required/>
            <input id="addr-name" class="bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface py-2 px-1 placeholder:text-outline-variant" placeholder="Full Name" required/>
            <input id="addr-phone" class="bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface py-2 px-1 placeholder:text-outline-variant" placeholder="Phone"/>
            <input id="addr-city" class="bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface py-2 px-1 placeholder:text-outline-variant" placeholder="City" required/>
            <input id="addr-postal" class="bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface py-2 px-1 placeholder:text-outline-variant" placeholder="Postal Code" required/>
            <textarea id="addr-line" class="md:col-span-2 bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface py-2 px-1 placeholder:text-outline-variant resize-none" placeholder="Full Address" rows="2" required></textarea>
            <div class="md:col-span-2 flex gap-3 justify-end">
              <button type="button" onclick="document.getElementById('address-form-container').classList.add('hidden')" class="px-4 py-2 text-on-surface-variant hover:text-on-surface transition-colors">Cancel</button>
              <button type="submit" class="px-6 py-2 bg-primary text-on-primary rounded-lg font-bold">Save Address</button>
            </div>
          </form>
        </div>
        <div id="addresses-list" class="space-y-4">
          <p class="text-on-surface-variant">Loading addresses...</p>
        </div>
      </div>

      <!-- Wishlist Section -->
      <div id="section-wishlist" class="profile-section hidden">
        <h2 class="font-headline-xl text-2xl md:text-headline-xl text-primary mb-6">My Wishlist</h2>
        <div id="wishlist-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-4">
          <p class="text-on-surface-variant col-span-full text-center py-12">Loading wishlist...</p>
        </div>
      </div>

      <!-- Settings Section -->
      <div id="section-settings" class="profile-section hidden">
        <h2 class="font-headline-xl text-2xl md:text-headline-xl text-primary mb-6">Profile Settings</h2>
        <form onsubmit="handleUpdateProfile(event)" class="glass-card rounded-xl p-6 border border-outline-variant/20 space-y-6 max-w-lg">
          <div class="space-y-2">
            <label class="font-label-caps text-label-caps text-outline ml-1">Full Name</label>
            <input id="settings-name" class="w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface py-3 px-1" type="text"/>
          </div>
          <div class="space-y-2">
            <label class="font-label-caps text-label-caps text-outline ml-1">Phone</label>
            <input id="settings-phone" class="w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface py-3 px-1" type="tel"/>
          </div>
          <div class="space-y-2">
            <label class="font-label-caps text-label-caps text-outline ml-1">Email</label>
            <input id="settings-email" class="w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface-variant py-3 px-1" type="email" disabled/>
          </div>
          <button type="submit" class="px-8 py-3 bg-primary text-on-primary font-bold rounded-xl shadow-lg hover:shadow-primary/20 transition-all">Save Changes</button>
        </form>
      </div>

    </section>
  </div>
</main>

<script src="/js/app.js"></script>
<script>
// Check auth on load
KK.on('auth', (user) => {
  if (!user) { window.location.href = '/auth?redirect=/profile'; return; }
  document.getElementById('profile-name').textContent = user.full_name || 'User';
  document.getElementById('profile-email').textContent = user.email;
  loadOrders();
  loadAddresses();
  loadWishlistItems();
  loadSettings();
});

function showSection(name) {
  document.querySelectorAll('.profile-section').forEach(s => s.classList.add('hidden'));
  document.getElementById(`section-${name}`).classList.remove('hidden');
  document.querySelectorAll('.profile-tab').forEach(t => {
    t.classList.toggle('bg-primary/10', t.dataset.tab === name);
    t.classList.toggle('text-primary', t.dataset.tab === name);
    t.classList.toggle('text-on-surface-variant', t.dataset.tab !== name);
  });
}

async function loadOrders() {
  try {
    const orders = await KK.getOrders();
    const el = document.getElementById('orders-list');
    if (!orders.length) {
      el.innerHTML = '<div class="text-center py-12 text-on-surface-variant"><span class="material-symbols-outlined text-5xl mb-4 block opacity-30">receipt_long</span><p>No orders yet</p><a href="/collection" class="text-primary underline mt-2 inline-block">Start Shopping</a></div>';
      return;
    }
    el.innerHTML = orders.map(o => `
      <div class="glass-card rounded-xl p-5 border border-outline-variant/20">
        <div class="flex flex-wrap justify-between items-start gap-3 mb-3">
          <div>
            <span class="font-headline-md text-lg text-on-surface">${o.order_number}</span>
            <span class="ml-2 px-2 py-0.5 rounded-full text-xs font-bold ${getStatusColor(o.status)}">${o.status_display}</span>
          </div>
          <span class="text-primary font-bold text-lg">₹${parseFloat(o.total).toLocaleString()}</span>
        </div>
        <p class="text-on-surface-variant text-sm mb-3">${new Date(o.created_at).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'})}</p>
        <div class="flex flex-wrap gap-2">${(o.items||[]).map(i => `<div class="flex items-center gap-2 bg-surface-container rounded-lg px-3 py-1.5"><img src="${i.product_image}" class="w-8 h-8 rounded object-cover"/><span class="text-sm">${i.product_name} x${i.quantity}</span></div>`).join('')}</div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('orders-list').innerHTML = '<p class="text-on-surface-variant">Could not load orders</p>';
  }
}

function getStatusColor(s) {
  const colors = {pending:'bg-primary/20 text-primary',confirmed:'bg-tertiary/20 text-tertiary',processing:'bg-secondary/20 text-secondary',shipped:'bg-primary/30 text-primary',delivered:'bg-tertiary-container text-on-tertiary',cancelled:'bg-error-container text-on-error-container'};
  return colors[s] || 'bg-surface-container text-on-surface-variant';
}

async function loadAddresses() {
  try {
    const addrs = await KK.getAddresses();
    const el = document.getElementById('addresses-list');
    if (!addrs.length) { el.innerHTML = '<p class="text-on-surface-variant text-center py-8">No saved addresses</p>'; return; }
    el.innerHTML = addrs.map(a => `
      <div class="glass-card rounded-xl p-5 border border-outline-variant/20 flex justify-between items-start">
        <div>
          <div class="flex items-center gap-2 mb-1"><span class="font-bold text-on-surface">${a.label}</span>${a.is_default?'<span class="px-2 py-0.5 bg-primary/20 text-primary text-xs rounded-full font-bold">Default</span>':''}</div>
          <p class="text-on-surface-variant text-sm">${a.full_name}</p>
          <p class="text-on-surface-variant text-sm">${a.address_line}</p>
          <p class="text-on-surface-variant text-sm">${a.city} - ${a.postal_code}</p>
        </div>
        <button onclick="deleteAddr('${a.id}')" class="p-2 hover:bg-error-container/20 rounded-full transition-colors"><span class="material-symbols-outlined text-error text-lg">delete</span></button>
      </div>
    `).join('');
  } catch(e) {}
}

function showAddressForm() { document.getElementById('address-form-container').classList.remove('hidden'); }

async function handleAddAddress(e) {
  e.preventDefault();
  try {
    await KK.addAddress({
      label: document.getElementById('addr-label').value,
      full_name: document.getElementById('addr-name').value,
      phone: document.getElementById('addr-phone').value,
      address_line: document.getElementById('addr-line').value,
      city: document.getElementById('addr-city').value,
      postal_code: document.getElementById('addr-postal').value,
    });
    document.getElementById('address-form-container').classList.add('hidden');
    KK.toast('Address saved!', 'success');
    loadAddresses();
  } catch(e) { KK.toast(e.message, 'error'); }
}

async function deleteAddr(id) {
  if (!confirm('Delete this address?')) return;
  await KK.deleteAddress(id);
  KK.toast('Address deleted', 'info');
  loadAddresses();
}

async function loadWishlistItems() {
  try {
    const items = await KK.loadWishlist();
    const el = document.getElementById('wishlist-grid');
    if (!items.length) { el.innerHTML = '<p class="text-on-surface-variant col-span-full text-center py-12">Your wishlist is empty<br><a href="/collection" class="text-primary underline">Browse Products</a></p>'; return; }
    el.innerHTML = items.map(w => {
      const p = w.product;
      return `<a href="/product?id=${p.id}" class="glass-card rounded-xl p-3 border border-outline-variant/10 hover:border-primary/30 transition-all group">
        <div class="aspect-square rounded-lg overflow-hidden bg-surface-container mb-3"><img src="${p.image_url}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700"/></div>
        <h3 class="font-headline-md text-sm text-on-surface mb-1 line-clamp-1">${p.name}</h3>
        <div class="flex justify-between items-center"><span class="text-primary font-bold text-sm">₹${p.price}</span>
        <button onclick="event.preventDefault();removeWish('${w.id}','${p.id}')" class="p-1.5 bg-error-container/20 rounded-full"><span class="material-symbols-outlined text-error text-sm">close</span></button></div>
      </a>`;
    }).join('');
  } catch(e) {}
}

async function removeWish(id, pid) {
  await KK.toggleWishlist(pid);
  loadWishlistItems();
}

async function loadSettings() {
  try {
    const p = await KK.getProfile();
    document.getElementById('settings-name').value = p.full_name || '';
    document.getElementById('settings-phone').value = p.phone || '';
    document.getElementById('settings-email').value = p.email || '';
  } catch(e) {}
}

async function handleUpdateProfile(e) {
  e.preventDefault();
  try {
    await KK.updateProfile({
      full_name: document.getElementById('settings-name').value,
      phone: document.getElementById('settings-phone').value,
    });
    KK.toast('Profile updated!', 'success');
  } catch(e) { KK.toast(e.message, 'error'); }
}

async function handleLogout() {
  await KK.logout();
  window.location.href = '/';
}

showSection('orders');

// Particle effect
(function(){const body=document.body;let lastTime=0;function h(e){const now=Date.now();if(now-lastTime<40)return;lastTime=now;let x,y;if(e.type==='touchmove'){x=e.touches[0].clientX;y=e.touches[0].clientY}else{x=e.clientX;y=e.clientY}const p=document.createElement('div');p.className='palm-particle';const ox=(Math.random()-0.5)*8,oy=(Math.random()-0.5)*8;p.style.transform=`translate(${x+ox}px, ${y+oy}px) scale(1)`;body.appendChild(p);requestAnimationFrame(()=>{setTimeout(()=>{p.style.transform=`translate(${x+ox}px, ${y+oy}px) scale(0)`;p.style.opacity='0'},30)});setTimeout(()=>p.remove(),500)}window.addEventListener('mousemove',h);window.addEventListener('touchmove',h,{passive:true})})();
</script>
</body></html>
