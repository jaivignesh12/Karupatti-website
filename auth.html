<!DOCTYPE html>
<html class="dark" lang="en" style="background:#18120b"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Karupatti Kadai</title>
<link rel="icon" type="image/png" href="/video/logo.png" />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@500;600;700&amp;family=Be+Vietnam+Pro:wght@400;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      "colors":{"inverse-primary":"#825500","on-primary":"#452b00","background":"#18120b","on-background":"#eee0d3","primary-container":"#c58308","surface-container-high":"#302920","surface-container-highest":"#3b342b","primary":"#ffb952","error":"#ffb4ab","surface-bright":"#40382f","outline-variant":"#514535","secondary":"#e3bfad","surface":"#18120b","on-surface-variant":"#d6c4af","surface-container":"#251f17","on-surface":"#eee0d3","outline":"#9e8e7b","on-primary-container":"#3c2500","surface-container-lowest":"#130d07","surface-tint":"#ffb952","on-error":"#690005","error-container":"#93000a","on-error-container":"#ffdad6","tertiary":"#b8cf88","tertiary-container":"#839857","on-tertiary":"#253600"},
      "borderRadius":{"DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem"},
      "spacing":{"unit":"8px","section-gap":"80px","gutter":"16px","margin-mobile":"16px","container-max":"1280px"},
      "fontFamily":{"body-md":["Be Vietnam Pro"],"label-caps":["Be Vietnam Pro"],"headline-md":["Noto Serif"],"body-lg":["Be Vietnam Pro"],"display-lg":["Noto Serif"],"headline-xl":["Noto Serif"]},
      "fontSize":{"body-md":["15px",{"lineHeight":"22px","fontWeight":"400"}],"label-caps":["11px",{"lineHeight":"16px","letterSpacing":"0.1em","fontWeight":"700"}],"headline-md":["24px",{"lineHeight":"32px","fontWeight":"500"}],"body-lg":["16px",{"lineHeight":"24px","fontWeight":"400"}],"display-lg":["36px",{"lineHeight":"44px","letterSpacing":"-0.02em","fontWeight":"700"}],"headline-xl":["32px",{"lineHeight":"40px","fontWeight":"600"}]}
    },
  },
}
</script>
<style>
.material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24 }
.grain-overlay { background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuCAjsWVLRhUyDL3Cc1loQ1KPn2R-XVCsJwZ4KUq3BUE6akN6hqTcOJ56Wc0yywtbp5TbEUgjSpWD7SPtajMBavgS7nDFg-ltBw6YjkG6LwXejfL3NiNNv_-yxjJgmBYIN92KE9EHRD9M6svjEsK6L0E5IkmUsSbFdO7qYEfdEnLK71UsosftMdupSWAxZynwucPcf3MHAsKRdutJy8rOCL8SVkHOvmyDl5aRL0Pojm_VzeYZ4VzW_dvqLA7jwBSBzzT5g7Wl95yWVM); opacity: 0.05; pointer-events: none }
.jaggery-gradient { background: radial-gradient(circle at center, #3c2500 0%, #18120b 100%) fixed }
.gold-dust { background: radial-gradient(circle, rgba(255, 185, 82, 0.2) 0%, rgba(255, 185, 82, 0) 70%) }
.palm-particle { position:fixed;top:0;left:0;width:6px;height:6px;background-color:#ffb952;border-radius:50%;pointer-events:none;z-index:9999;box-shadow:0 0 8px #ffb952;opacity:0.8;transition:transform 0.4s ease-out,opacity 0.4s ease-out }
.glass-card { backdrop-filter:blur(20px);background:linear-gradient(135deg,rgba(59,52,43,0.4) 0%,rgba(24,18,11,0.6) 100%) }
</style>
</head>
<body class="jaggery-gradient text-on-background font-body-md selection:bg-primary/30">

<!-- Nav -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/20 shadow-2xl">
<div class="flex justify-between items-center w-full px-gutter py-4 max-w-container-max mx-auto">
  <a href="/" class="flex items-center gap-2 md:gap-3 font-display-lg text-xl md:text-2xl text-primary drop-shadow-[0_2px_4px_rgba(255,185,82,0.3)] hover:opacity-90 transition-opacity">
    <img src="/video/logo.png" alt="Karupatti Kadai Logo" class="w-8 h-8 rounded-full border border-primary/20 object-cover shadow-md" />
    <span>Karupatti Kadai</span>
  </a>
  <div class="flex items-center gap-2">
    <a href="/collection" class="text-on-surface-variant hover:text-primary transition-colors font-body-md hidden md:block">Shop All</a>
    <a href="/checkout" class="p-2 hover:bg-primary/10 rounded-full transition-all relative">
      <span class="material-symbols-outlined text-primary">shopping_cart</span>
      <span data-cart-count class="absolute top-1 right-1 w-4 h-4 bg-primary text-on-primary text-[10px] flex items-center justify-center rounded-full font-bold" style="display:none">0</span>
    </a>
  </div>
</div>
</nav>

<!-- Main Auth Section -->
<main class="min-h-screen flex items-center justify-center pt-24 pb-12 relative overflow-hidden">
  <div class="absolute inset-0 gold-dust animate-pulse"></div>
  <div class="grain-overlay absolute inset-0"></div>
  
  <div class="relative z-10 w-full max-w-md mx-auto px-gutter">
    <!-- Auth Card -->
    <div class="glass-card rounded-2xl border border-outline-variant/20 p-8 md:p-10 shadow-2xl">
      
      <!-- Tabs -->
      <div class="flex mb-8 border-b border-outline-variant/20">
        <button id="tab-login" onclick="switchTab('login')" class="flex-1 pb-3 font-label-caps text-label-caps text-primary border-b-2 border-primary">LOGIN</button>
        <button id="tab-signup" onclick="switchTab('signup')" class="flex-1 pb-3 font-label-caps text-label-caps text-on-surface-variant border-b-2 border-transparent hover:text-primary transition-colors">SIGN UP</button>
      </div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)" class="space-y-6">
        <div class="space-y-2">
          <label class="font-label-caps text-label-caps text-outline ml-1">Email</label>
          <input id="login-email" class="w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface transition-all placeholder:text-outline-variant py-3 px-1" placeholder="your@email.com" type="email" required/>
        </div>
        <div class="space-y-2">
          <label class="font-label-caps text-label-caps text-outline ml-1">Password</label>
          <input id="login-password" class="w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface transition-all placeholder:text-outline-variant py-3 px-1" placeholder="Enter password" type="password" required/>
        </div>
        <div id="login-error" class="text-error text-sm hidden"></div>
        <button type="submit" id="login-btn" class="w-full py-4 bg-primary text-on-primary font-bold rounded-xl shadow-lg hover:shadow-primary/20 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">login</span> Sign In
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" onsubmit="handleSignup(event)" class="space-y-6 hidden">
        <div class="space-y-2">
          <label class="font-label-caps text-label-caps text-outline ml-1">Full Name</label>
          <input id="signup-name" class="w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface transition-all placeholder:text-outline-variant py-3 px-1" placeholder="Your full name" type="text" required/>
        </div>
        <div class="space-y-2">
          <label class="font-label-caps text-label-caps text-outline ml-1">Email</label>
          <input id="signup-email" class="w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface transition-all placeholder:text-outline-variant py-3 px-1" placeholder="your@email.com" type="email" required/>
        </div>
        <div class="space-y-2">
          <label class="font-label-caps text-label-caps text-outline ml-1">Phone Number</label>
          <input id="signup-phone" class="w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface transition-all placeholder:text-outline-variant py-3 px-1" placeholder="+91 98765 43210" type="tel" required/>
        </div>
        <div class="space-y-2">
          <label class="font-label-caps text-label-caps text-outline ml-1">Password</label>
          <input id="signup-password" class="w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface transition-all placeholder:text-outline-variant py-3 px-1" placeholder="Min 6 characters" type="password" minlength="6" required/>
        </div>
        <div class="space-y-2">
          <label class="font-label-caps text-label-caps text-outline ml-1">Confirm Password</label>
          <input id="signup-confirm-password" class="w-full bg-transparent border-0 border-b border-outline focus:border-primary focus:ring-0 text-on-surface transition-all placeholder:text-outline-variant py-3 px-1" placeholder="Repeat password" type="password" required/>
        </div>
        <div id="signup-error" class="text-error text-sm hidden"></div>
        <button type="submit" id="signup-btn" class="w-full py-4 bg-primary text-on-primary font-bold rounded-xl shadow-lg hover:shadow-primary/20 hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">person_add</span> Create Account
        </button>
      </form>


    </div>
  </div>
</main>

<script src="/js/app.js"></script>
<script>
function switchTab(tab) {
  const loginForm = document.getElementById('login-form');
  const signupForm = document.getElementById('signup-form');
  const tabLogin = document.getElementById('tab-login');
  const tabSignup = document.getElementById('tab-signup');
  
  if (tab === 'login') {
    loginForm.classList.remove('hidden');
    signupForm.classList.add('hidden');
    tabLogin.classList.add('text-primary', 'border-primary');
    tabLogin.classList.remove('text-on-surface-variant', 'border-transparent');
    tabSignup.classList.remove('text-primary', 'border-primary');
    tabSignup.classList.add('text-on-surface-variant', 'border-transparent');
  } else {
    loginForm.classList.add('hidden');
    signupForm.classList.remove('hidden');
    tabSignup.classList.add('text-primary', 'border-primary');
    tabSignup.classList.remove('text-on-surface-variant', 'border-transparent');
    tabLogin.classList.remove('text-primary', 'border-primary');
    tabLogin.classList.add('text-on-surface-variant', 'border-transparent');
  }
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('login-error');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Signing in...';
  errEl.classList.add('hidden');
  try {
    await KK.login(
      document.getElementById('login-email').value,
      document.getElementById('login-password').value
    );
    const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
    window.location.href = redirect;
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">login</span> Sign In';
  }
}

async function handleSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('signup-btn');
  const errEl = document.getElementById('signup-error');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> Creating account...';
  errEl.classList.add('hidden');
  const password = document.getElementById('signup-password').value;
  const confirmPassword = document.getElementById('signup-confirm-password').value;
  
  if (password !== confirmPassword) {
    errEl.textContent = 'Passwords do not match';
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">person_add</span> Create Account';
    return;
  }

  try {
    await KK.signup(
      document.getElementById('signup-email').value,
      password,
      document.getElementById('signup-name').value,
      document.getElementById('signup-phone').value
    );
    const redirect = new URLSearchParams(window.location.search).get('redirect') || '/';
    window.location.href = redirect;
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">person_add</span> Create Account';
  }
}

// Redirect if already logged in
KK.on('auth', (user) => {
  if (user && !window.location.search.includes('force')) {
    window.location.href = '/';
  }
});

// Particle effect
(function() {
  const body = document.body; let lastTime = 0;
  function handleInteraction(e) {
    const now = Date.now(); if (now - lastTime < 40) return; lastTime = now;
    let x, y;
    if (e.type === 'touchmove') { x = e.touches[0].clientX; y = e.touches[0].clientY; } else { x = e.clientX; y = e.clientY; }
    const p = document.createElement('div'); p.className = 'palm-particle';
    const ox = (Math.random()-0.5)*8, oy = (Math.random()-0.5)*8;
    p.style.transform = `translate(${x+ox}px, ${y+oy}px) scale(1)`; body.appendChild(p);
    requestAnimationFrame(() => { setTimeout(() => { p.style.transform = `translate(${x+ox}px, ${y+oy}px) scale(0)`; p.style.opacity = '0'; }, 30); });
    setTimeout(() => p.remove(), 500);
  }
  window.addEventListener('mousemove', handleInteraction);
  window.addEventListener('touchmove', handleInteraction, { passive: true });
})();
</script>
</body></html>
